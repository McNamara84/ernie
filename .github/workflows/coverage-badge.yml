name: Coverage Badge Generation
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PHP + Xdebug for Coverage
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: xdebug
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist

      - name: Build assets
        run: npm run build

      - name: Copy .env file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate --force

      - name: Generate Wayfinder Routes
        run: php artisan wayfinder:generate

      # Laravel Tests with Clover Report
      - name: Run tests with coverage
        env:
          XDEBUG_MODE: coverage
        run: php artisan test --coverage-clover=coverage.xml

      # Create Badge from coverage.xml and commit
      - name: Create coverage badge
        uses: timkrase/phpunit-coverage-badge@v1.2.1
        with:
          report: coverage.xml
          coverage_badge_path: output/coverage.svg
          push_badge: false

      - name: Ensure output directory is writable
        run: sudo chown -R $USER:$USER output

      - name: Run Vitest with coverage
        id: vitest
        env:
          LARAVEL_BYPASS_ENV_CHECK: 1
          VITE_APP_URL: ""
          APP_URL: ""
        # Continue even if some tests fail (flaky timeouts) - coverage is still generated
        continue-on-error: true
        run: npx vitest run --coverage

      - name: Verify coverage report exists
        id: verify_coverage
        run: |
          if [ ! -f "coverage/coverage-summary.json" ]; then
            echo "::warning::Vitest coverage report not found. Creating fallback badge."
            echo "Listing coverage directory contents:"
            ls -la coverage/ 2>/dev/null || echo "Coverage directory does not exist"
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "exists=true" >> $GITHUB_OUTPUT
            cat coverage/coverage-summary.json | head -c 500
          fi

      - name: Install badge-maker
        run: npm install --no-save badge-maker@5.0.2

      - name: Create Vitest coverage badge
        run: |
          mkdir -p output
          if [ "${{ steps.verify_coverage.outputs.exists }}" == "true" ]; then
            node -e "
              const fs = require('fs');
              const { makeBadge } = require('badge-maker');
              const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json'));
              const pct = data.total?.lines?.pct;
              const coverage = typeof pct === 'number' && !isNaN(pct) ? Math.round(pct) : 0;
              let color = 'red';
              if (coverage >= 90) color = 'brightgreen';
              else if (coverage >= 80) color = 'green';
              else if (coverage >= 70) color = 'yellow';
              else if (coverage >= 50) color = 'orange';
              const svg = makeBadge({ label: 'Vitest Coverage', message: coverage + '%', color });
              fs.writeFileSync('output/vitest-coverage.svg', svg);
              console.log('Badge created: ' + coverage + '% (' + color + ')');
            "
          else
            echo "Creating fallback badge (N/A)"
            node -e "
              const { makeBadge } = require('badge-maker');
              const svg = makeBadge({ label: 'Vitest Coverage', message: 'N/A', color: 'lightgrey' });
              require('fs').writeFileSync('output/vitest-coverage.svg', svg);
            "
          fi

      - name: Git push to image-data branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./output
          publish_branch: image-data
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
