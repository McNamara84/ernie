services:
  # Traefik Reverse Proxy - mirrors production environment
  # Serves application on https://localhost:3333 (no prefix)
  # On Windows: Docker provider disabled, uses static routes.yml
  traefik:
    image: traefik:v3.2.5@sha256:e561a37f8710d9cf41c78bdf421d822b2c0b48267ec0552e644565fb55466ea9
    container_name: ernie-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.http.address=:80"
      - "--entrypoints.https.address=:443"
      - "--entrypoints.http.http.redirections.entrypoint.to=https"
      - "--entrypoints.http.http.redirections.entrypoint.scheme=https"
      - "--log.level=INFO"
    ports:
      - "3333:443"
      - "8080:8080"  # Traefik Dashboard
    volumes:
      - ./docker/traefik/certs:/etc/traefik/certs:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - ernie-dev-network

  # Laravel App (PHP-FPM) - Development Mode
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: app
    container_name: ernie-app-dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      # Source code mounting for hot-reload
      - .:/var/www/html
      # Persist vendor/node_modules for better performance
      - ernie-vendor:/var/www/html/vendor
      - ernie-node-modules:/var/www/html/node_modules
      # PHP config
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - ernie-dev-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      # You can emulate production-style subdomains locally using e.g. https://ernie.localhost:3333
      # (certificate SAN already includes *.localhost). Override via ERNIE_DEV_HOST if needed.
      - APP_URL=https://${ERNIE_DEV_HOST:-ernie.localhost}:${ERNIE_DEV_HTTPS_PORT:-3333}
      - VITE_DEV_SERVER_URL=https://${ERNIE_DEV_HOST:-ernie.localhost}:${ERNIE_DEV_HTTPS_PORT:-3333}
      # =========================================================================
      # Session Configuration (Docker Development)
      # =========================================================================
      # SESSION_SECURE_COOKIE=false because self-signed certificates aren't trusted
      # WARNING: In production, SESSION_SECURE_COOKIE must be true!
      # =========================================================================
      - SESSION_DRIVER=database
      - SESSION_LIFETIME=120
      - SESSION_PATH=/
      # If you use a subdomain like ernie.localhost, set ERNIE_DEV_SESSION_DOMAIN=.localhost
      - SESSION_DOMAIN=${ERNIE_DEV_SESSION_DOMAIN:-ernie.localhost}
      - SESSION_SECURE_COOKIE=false
      - SESSION_SAME_SITE=lax
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ernie
      - DB_USERNAME=ernie
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - BROADCAST_DRIVER=log
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=database
      - FUJI_ENABLED=${FUJI_ENABLED:-true}
      - FUJI_BASE_URL=${FUJI_BASE_URL:-http://fuji:1071}
      - FUJI_USERNAME=${FUJI_USERNAME:-ernie}
      - FUJI_PASSWORD=${FUJI_PASSWORD:-change-me}
      - FUJI_TIMEOUT=${FUJI_TIMEOUT:-120}
      - FUJI_CONNECT_TIMEOUT=${FUJI_CONNECT_TIMEOUT:-10}
      - FUJI_USE_DATACITE=${FUJI_USE_DATACITE:-true}
      - FUJI_USE_GITHUB=${FUJI_USE_GITHUB:-false}
      - FUJI_TEST_DEBUG=${FUJI_TEST_DEBUG:-false}
      - FUJI_METRIC_VERSION=${FUJI_METRIC_VERSION:-metrics_v0.8}
      # If you use a subdomain like ernie.localhost, set ERNIE_DEV_STATEFUL_DOMAINS=ernie.localhost:3333
      - SANCTUM_STATEFUL_DOMAINS=${ERNIE_DEV_STATEFUL_DOMAINS:-ernie.localhost:3333,localhost:3333}

  # Nginx Webserver
  webserver:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: nginx
    container_name: ernie-webserver-dev
    restart: unless-stopped
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ernie-dev-network
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      # Main application router (subdomain-based, no prefix)
      # The broad regex allows localhost and any *.localhost subdomain for development flexibility.
      # This enables testing with different subdomains without config changes (e.g., ernie.localhost, test.localhost).
      - "traefik.http.routers.ernie-router.rule=HostRegexp(`{host:localhost(:[0-9]+)?|[a-z0-9-]+\\.localhost(:[0-9]+)?}`)"
      - "traefik.http.routers.ernie-router.entrypoints=https"
      - "traefik.http.routers.ernie-router.service=ernie-service"
      - "traefik.http.routers.ernie-router.tls=true"
      # Service
      - "traefik.http.services.ernie-service.loadbalancer.server.port=80"

  # Vite Dev Server for Hot Module Replacement
  # Runs in app container as Wayfinder plugin requires php artisan
  vite:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: app
    container_name: ernie-vite-dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ernie-vendor:/var/www/html/vendor
      - ernie-node-modules:/var/www/html/node_modules
    networks:
      - ernie-dev-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=https://${ERNIE_DEV_HOST:-ernie.localhost}:${ERNIE_DEV_HTTPS_PORT:-3333}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ernie
      - DB_USERNAME=ernie
      - DB_PASSWORD=secret
      - VITE_APP_NAME=ERNIE
      - VITE_DEV_SERVER_URL=https://${ERNIE_DEV_HOST:-ernie.localhost}:${ERNIE_DEV_HTTPS_PORT:-3333}
      - VITE_HMR_HOST=${ERNIE_DEV_HOST:-ernie.localhost}
      - VITE_HMR_PORT=${ERNIE_DEV_HTTPS_PORT:-3333}
      - VITE_USE_POLLING=true
    entrypoint: [""]
    command: ["/bin/sh", "/var/www/html/docker/vite-entrypoint.sh"]
    labels:
      - "traefik.enable=true"
      # Note: These labels are for documentation/reference only.
      # Actual routing is defined in docker/traefik/dynamic/routes.yml
      - "traefik.http.routers.ernie-vite.rule=Host(`localhost`) && PathPrefix(`/@vite`)"
      - "traefik.http.routers.ernie-vite.entrypoints=https"
      - "traefik.http.routers.ernie-vite.priority=200"
      - "traefik.http.routers.ernie-vite.service=ernie-vite-service"
      - "traefik.http.routers.ernie-vite.tls=true"
      - "traefik.http.services.ernie-vite-service.loadbalancer.server.port=5173"

  # MySQL Database
  db:
    image: mysql:8.0.46@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
    container_name: ernie-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: ernie
      MYSQL_USER: ernie
      MYSQL_PASSWORD: secret
    volumes:
      - ernie-db-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - ernie-dev-network
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis for caching and sessions
  redis:
    image: redis:8.6.3-alpine@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
    container_name: ernie-redis-dev
    restart: unless-stopped
    networks:
      - ernie-dev-network
    ports:
      - "${REDIS_PORT:-6379}:6379"

  fuji:
    image: ghcr.io/pangaea-data-publisher/fuji@sha256:ce91f8c5998655c34f570d68f52254cb5dfa29d659808c571c8e6f9249948a0e
    container_name: ernie-fuji-dev
    restart: unless-stopped
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        set -e
        mkdir -p "${TIKA_LOG_PATH:-/tmp/tika}"
        export TIKA_LOG_PATH="${TIKA_LOG_PATH:-/tmp/tika}"
        python3 -c 'import json,os; open("/usr/src/app/fuji_server/config/users.py","w").write("fuji_users = "+json.dumps({os.environ["FUJI_USERNAME"]:os.environ["FUJI_PASSWORD"]})+"\n")'
        exec python3 -m fuji_server -c /usr/src/app/fuji_server/config/server.ini
    environment:
      - FUJI_USERNAME=${FUJI_USERNAME:-ernie}
      - FUJI_PASSWORD=${FUJI_PASSWORD:-change-me}
      - TIKA_LOG_PATH=/tmp/tika
    networks:
      - ernie-dev-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:1071/fuji/api/v1/ui/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # CloudBeaver Database Admin
  cloudbeaver:
    image: dbeaver/cloudbeaver:26.0.4@sha256:824c5e389155af3674b8e9a837bc4fd4454fcb43ac115c8be4c733e8b7315a4e
    container_name: ernie-cloudbeaver-dev
    restart: unless-stopped
    volumes:
      - cloudbeaver-workspace-dev:/opt/cloudbeaver/workspace
      - ./docker/cloudbeaver/setup-connections.sh:/opt/cloudbeaver/setup-connections.sh:ro
    entrypoint: ["/bin/bash", "/opt/cloudbeaver/setup-connections.sh"]
    networks:
      - ernie-dev-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      - CB_SERVER_NAME=ERNIE Database Admin (Dev)
      - CB_ADMIN_NAME=cbadmin
      - CB_ADMIN_PASSWORD=devpassword
      - CLOUDBEAVER_APP_ANONYMOUS_ACCESS_ENABLED=false
      - CLOUDBEAVER_APP_SUPPORTS_CUSTOM_CONNECTIONS=true
      # Database connection credentials for auto-configuration
      - CB_DB_HOST=db
      - CB_DB_NAME=ernie
      - CB_DB_USER=ernie
      - CB_DB_PASSWORD=secret
      - CB_DB_TYPE=dev
    labels:
      - "traefik.enable=true"
      # Note: These labels are for documentation/reference only.
      # Actual routing is defined in docker/traefik/dynamic/routes.yml
      - "traefik.http.routers.ernie-cloudbeaver.rule=Host(`db.ernie.localhost`)"
      - "traefik.http.routers.ernie-cloudbeaver.entrypoints=https"
      - "traefik.http.routers.ernie-cloudbeaver.service=ernie-cloudbeaver-service"
      - "traefik.http.routers.ernie-cloudbeaver.tls=true"
      - "traefik.http.services.ernie-cloudbeaver-service.loadbalancer.server.port=8978"

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: app
    container_name: ernie-queue-dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ernie-vendor:/var/www/html/vendor
    networks:
      - ernie-dev-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      fuji:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ernie
      - DB_USERNAME=ernie
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=database
      - FUJI_ENABLED=${FUJI_ENABLED:-true}
      - FUJI_BASE_URL=${FUJI_BASE_URL:-http://fuji:1071}
      - FUJI_USERNAME=${FUJI_USERNAME:-ernie}
      - FUJI_PASSWORD=${FUJI_PASSWORD:-change-me}
      - FUJI_TIMEOUT=${FUJI_TIMEOUT:-120}
      - FUJI_CONNECT_TIMEOUT=${FUJI_CONNECT_TIMEOUT:-10}
      - FUJI_USE_DATACITE=${FUJI_USE_DATACITE:-true}
      - FUJI_USE_GITHUB=${FUJI_USE_GITHUB:-false}
      - FUJI_TEST_DEBUG=${FUJI_TEST_DEBUG:-false}
      - FUJI_METRIC_VERSION=${FUJI_METRIC_VERSION:-metrics_v0.8}
    command: php artisan queue:work --queue=vocabularies,default,imports --sleep=3 --tries=3

networks:
  ernie-dev-network:
    driver: bridge

volumes:
  ernie-db-data:
    driver: local
  ernie-vendor:
    driver: local
  ernie-node-modules:
    driver: local
  cloudbeaver-workspace-dev:
    driver: local
