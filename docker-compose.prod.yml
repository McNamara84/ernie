services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    pull_policy: build
    container_name: dockerized-laravel-app
    restart: unless-stopped
    volumes:
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - dockerized-laravel-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    environment:
      - APP_KEY=${APP_KEY}
      - APP_URL=https://ernie.rz-vm499.gfz.de
      - APP_ENV=production
      - APP_DEBUG=false
      - INERTIA_SSR_ENABLED=false
      - ERNIE_API_KEY=${ERNIE_API_KEY}
      - DATACITE_ENDPOINT=${DATACITE_ENDPOINT:-https://api.datacite.org}
      - DATACITE_CLIENT_ID=${DATACITE_CLIENT_ID:-tib.gfz}
      - DATACITE_USERNAME=${DATACITE_USERNAME}
      - DATACITE_PASSWORD=${DATACITE_PASSWORD}
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=120
      - SESSION_PATH=/
      - SESSION_DOMAIN=ernie.rz-vm499.gfz.de
      - SESSION_SECURE_COOKIE=true
      - SESSION_SAME_SITE=lax
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - BROADCAST_DRIVER=log
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=database
      - BOT_PROTECTION_ENABLED=${BOT_PROTECTION_ENABLED:-true}
      - BOT_PROTECTION_AI_USER_AGENTS=${BOT_PROTECTION_AI_USER_AGENTS:-Amazonbot,anthropic-ai,Applebot-Extended,Bytespider,CCBot,ChatGPT-User,ClaudeBot,Claude-User,cohere-ai,Diffbot,FacebookBot,Google-Extended,GPTBot,ImagesiftBot,Meta-ExternalAgent,omgili,PerplexityBot,YouBot}
      - BOT_PROTECTION_AI_BOT_PUBLIC_PER_MINUTE=${BOT_PROTECTION_AI_BOT_PUBLIC_PER_MINUTE:-6}
      - BOT_PROTECTION_PUBLIC_LANDING_PER_MINUTE=${BOT_PROTECTION_PUBLIC_LANDING_PER_MINUTE:-60}
      - BOT_PROTECTION_PUBLIC_LANDING_JSONLD_PER_MINUTE=${BOT_PROTECTION_PUBLIC_LANDING_JSONLD_PER_MINUTE:-30}
      - BOT_PROTECTION_PUBLIC_PORTAL_PER_MINUTE=${BOT_PROTECTION_PUBLIC_PORTAL_PER_MINUTE:-20}
      - BOT_PROTECTION_LANDING_CACHE_TTL=${BOT_PROTECTION_LANDING_CACHE_TTL:-600}
      - BOT_PROTECTION_PORTAL_CACHE_TTL=${BOT_PROTECTION_PORTAL_CACHE_TTL:-120}
      - BOT_PROTECTION_VIEW_COUNT_DEBOUNCE_SECONDS=${BOT_PROTECTION_VIEW_COUNT_DEBOUNCE_SECONDS:-3600}
      - FUJI_ENABLED=${FUJI_ENABLED:-false}
      - FUJI_BASE_URL=${FUJI_BASE_URL:-http://fuji:1071}
      - FUJI_USERNAME=${FUJI_USERNAME:-ernie}
      - FUJI_PASSWORD=${FUJI_PASSWORD}
      - FUJI_TIMEOUT=${FUJI_TIMEOUT:-120}
      - FUJI_CONNECT_TIMEOUT=${FUJI_CONNECT_TIMEOUT:-10}
      - FUJI_USE_DATACITE=${FUJI_USE_DATACITE:-true}
      - FUJI_USE_GITHUB=${FUJI_USE_GITHUB:-false}
      - FUJI_TEST_DEBUG=${FUJI_TEST_DEBUG:-false}
      - FUJI_METRIC_VERSION=${FUJI_METRIC_VERSION:-metrics_v0.8}
      - SANCTUM_STATEFUL_DOMAINS=ernie.rz-vm499.gfz.de
      - DB_SUMARIOPMD_HOST=${DB_SUMARIOPMD_HOST}
      - DB_SUMARIOPMD_PORT=${DB_SUMARIOPMD_PORT:-3306}
      - DB_SUMARIOPMD_NAME=${DB_SUMARIOPMD_NAME}
      - DB_SUMARIOPMD_USER=${DB_SUMARIOPMD_USER}
      - DB_SUMARIOPMD_PASSWORD=${DB_SUMARIOPMD_PASSWORD}
      # Mail configuration
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@gfz-potsdam.de}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-ERNIE}

  webserver:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    pull_policy: build
    container_name: dockerized-laravel-webserver
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - storage-data:/var/www/html/storage:ro
    networks:
      - dockerized-laravel-network
      - traefik
    depends_on:
      - app
    labels:
      - "traefik.enable=true"
      # Router for the application (subdomain-based, no prefix needed)
      - "traefik.http.routers.ernie-router.rule=Host(`ernie.rz-vm499.gfz.de`)"
      - "traefik.http.routers.ernie-router.entrypoints=https"
      - "traefik.http.routers.ernie-router.service=ernie-service"
      # Service
      - "traefik.http.services.ernie-service.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik"

  db:
    image: mysql:9.7.0@sha256:c11782aa2a96624c1efc121768641d96954faa136d6aa82751b032d8c426ffbc
    container_name: dockerized-laravel-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MARIADB_DATABASE}
      - MYSQL_USER=${MARIADB_USER}
      - MYSQL_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - dockerized-laravel-data:/var/lib/mysql
    networks:
      - dockerized-laravel-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:8.6.4-alpine@sha256:d103b9cd0b54b98b2c38e2b19220ee7adfe4b0fb22c406baa75f321179da2f00
    container_name: dockerized-laravel-redis
    restart: unless-stopped
    networks:
      - dockerized-laravel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  fuji:
    image: ghcr.io/pangaea-data-publisher/fuji@sha256:a75a9c88fb46918afafb09593aa52aecc1adb12eb9f19a2fc2ebb8740be03d97
    container_name: ernie-fuji-prod
    restart: unless-stopped
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        set -e
        mkdir -p "${TIKA_LOG_PATH:-/tmp/tika}"
        export TIKA_LOG_PATH="${TIKA_LOG_PATH:-/tmp/tika}"
        python3 -c 'import json,os; open("/usr/src/app/fuji_server/config/users.py","w").write("fuji_users = "+json.dumps({os.environ["FUJI_USERNAME"]:os.environ["FUJI_PASSWORD"]})+"\n")'
        exec python3 -m fuji_server -c /usr/src/app/fuji_server/config/server.ini
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - FUJI_USERNAME=${FUJI_USERNAME:-ernie}
      - FUJI_PASSWORD=${FUJI_PASSWORD}
      - TIKA_LOG_PATH=/tmp/tika
    networks:
      - dockerized-laravel-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:1071/fuji/api/v1/ui/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    pull_policy: build
    container_name: dockerized-laravel-queue
    restart: unless-stopped
    command: php artisan queue:work --queue=vocabularies,default,imports --verbose --tries=3 --timeout=7200
    volumes:
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - dockerized-laravel-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_KEY=${APP_KEY}
      - APP_URL=https://ernie.rz-vm499.gfz.de
      - APP_ENV=production
      - APP_DEBUG=false
      - INERTIA_SSR_ENABLED=false
      - DATACITE_ENDPOINT=${DATACITE_ENDPOINT:-https://api.datacite.org}
      - DATACITE_CLIENT_ID=${DATACITE_CLIENT_ID:-tib.gfz}
      - DATACITE_USERNAME=${DATACITE_USERNAME}
      - DATACITE_PASSWORD=${DATACITE_PASSWORD}
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=database
      - FUJI_ENABLED=${FUJI_ENABLED:-false}
      - FUJI_BASE_URL=${FUJI_BASE_URL:-http://fuji:1071}
      - FUJI_USERNAME=${FUJI_USERNAME:-ernie}
      - FUJI_PASSWORD=${FUJI_PASSWORD}
      - FUJI_TIMEOUT=${FUJI_TIMEOUT:-120}
      - FUJI_CONNECT_TIMEOUT=${FUJI_CONNECT_TIMEOUT:-10}
      - FUJI_USE_DATACITE=${FUJI_USE_DATACITE:-true}
      - FUJI_USE_GITHUB=${FUJI_USE_GITHUB:-false}
      - FUJI_TEST_DEBUG=${FUJI_TEST_DEBUG:-false}
      - FUJI_METRIC_VERSION=${FUJI_METRIC_VERSION:-metrics_v0.8}
      # Mail configuration (needed for queued mail jobs)
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@gfz-potsdam.de}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-ERNIE}

networks:
  dockerized-laravel-network:
    driver: bridge
  traefik:
    external: true

volumes:
  dockerized-laravel-data:
    driver: local
  storage-data:
    driver: local
  bootstrap-cache:
    driver: local
