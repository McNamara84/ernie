codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

ignore:
  # Third-party UI library (shadcn/ui) — not our code
  - "resources/js/components/ui/**"
  # Auto-generated Wayfinder route helpers
  - "resources/js/actions/**"
  - "resources/js/routes/**"
  - "resources/js/routes.ts"
  # Application entry points (not unit-testable)
  - "resources/js/app.tsx"
  - "resources/js/ssr.tsx"
  - "resources/js/swagger.tsx"
  # Type definitions (no executable code)
  - "resources/js/types/**"
  # Legacy migration backups
  - "database/migrations_backup/**"
  # Framework boilerplate
  - "bootstrap/**"

flags:
  backend:
    paths:
      - app/
      - routes/
      - config/
      - database/
    carryforward: true
  frontend:
    paths:
      - resources/js/
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
