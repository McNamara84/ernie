codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

flags:
  backend:
    paths:
      - app/
      - routes/
      - config/
      - database/
    carryforward: true
  frontend:
    paths:
      - resources/js/
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
