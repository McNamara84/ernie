limit_req_zone $binary_remote_addr zone=ernie_public_portal:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=ernie_public_landing:10m rate=60r/m;

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Restore the real client IP from Traefik before applying rate limits.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    limit_req_status 429;

    # Handle build assets (Vite output)
    location /build/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Handle CORS for assets
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range";
    }

    # Handle static assets at root level
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Handle CORS for assets
        add_header Access-Control-Allow-Origin "*";
    }

    # Public discovery pages are dynamic and attractive to aggressive crawlers.
    # OAI-PMH remains outside these limits so standards-based harvesters can keep using it.
    location = /portal {
        limit_req zone=ernie_public_portal burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /datasets/ {
        limit_req zone=ernie_public_landing burst=30 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/10\.[0-9]+/ {
        limit_req zone=ernie_public_landing burst=30 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Handle all other requests
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_connect_timeout 30s;
        fastcgi_send_timeout 120s;
        fastcgi_read_timeout 120s;

        # Larger FastCGI buffers for Inertia pages with big JSON payloads.
        # Without these, pages like /resources and /editor can cause 502 errors
        # when the response is larger than the default buffer size.
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 32k;
        fastcgi_busy_buffers_size 64k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    client_max_body_size 64M;
}